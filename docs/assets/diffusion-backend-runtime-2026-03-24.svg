<svg xmlns="http://www.w3.org/2000/svg" width="980" height="708" viewBox="0 0 980 708" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion Optimizer Tier Comparison</title>
  <desc id="desc">Mean wall-clock runtime in milliseconds for heat and reaction diffusion workloads across RR optimization tiers.</desc>
  <rect width="980" height="708" fill="#fcfcf8"/>
