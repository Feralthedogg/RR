  <text x="561.8" y="190" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">175.0 ms ± 11.5</text>
  <rect x="380" y="218" width="20.5" height="22" fill="#74a7d4" rx="4"/>
  <text x="410.5" y="234" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">20.9 ms ± 0.7</text>
  <rect x="380" y="262" width="167.1" height="22" fill="#2a9d8f" rx="4"/>
  <text x="557.1" y="278" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">170.2 ms ± 10.2</text>
  <rect x="380" y="306" width="21.1" height="22" fill="#8fd0c4" rx="4"/>
