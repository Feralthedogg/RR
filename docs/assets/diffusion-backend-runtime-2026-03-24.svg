  <text x="920.0" y="366" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">539.8 ms ± 18.6</text>
  <rect x="380" y="394" width="409.8" height="22" fill="#b07aa1" rx="4"/>
  <text x="799.8" y="410" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">417.4 ms ± 8.6</text>
  <rect x="380" y="438" width="177.2" height="22" fill="#457b9d" rx="4"/>
  <text x="567.2" y="454" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#16212b">180.5 ms ± 7.4</text>
