<svg xmlns="http://www.w3.org/2000/svg" width="920" height="322" viewBox="0 0 920 322" role="img" aria-labelledby="title desc">
  <title id="title">Signal Pipeline Memory Profile</title>
  <desc id="desc">Rprofmem allocation pressure for direct vectorized GNU R and RR O2 warm kernels.</desc>
  <rect width="920" height="322" fill="#fcfcf8"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#16212b">Signal Pipeline Memory Profile</text>
  <text x="24" y="56" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4b5b67">Warm kernel allocation pressure, averaged over 10 calls in one GNU R process</text>
  <line x1="260" y1="264" x2="760" y2="264" stroke="#9aa8b2" stroke-width="1"/>
  <text x="24" y="102" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16212b">Direct base R vectorized warm</text>
  <rect x="260" y="80" width="500.0" height="32" fill="#2a9d8f" rx="4"/>
  <text x="902" y="101" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">4683.0 MB, 3734 alloc events</text>
  <text x="24" y="178" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16212b">RR O2 GNU R warm</text>
  <rect x="260" y="156" width="497.0" height="32" fill="#e76f51" rx="4"/>
  <text x="902" y="177" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">4654.5 MB, 4159 alloc events</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4b5b67">
    <text x="24" y="298">Source data: signal-pipeline-memory-2026-04-27.csv</text>
  </g>
</svg>
