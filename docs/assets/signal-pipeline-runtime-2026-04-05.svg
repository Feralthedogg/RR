<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="724" viewBox="0 0 1120 724" role="img" aria-labelledby="title desc">
  <title id="title">Signal Pipeline Runtime Comparison</title>
  <desc id="desc">Mean wall-clock runtime in milliseconds for a cross-language signal preprocessing pipeline benchmark.</desc>
  <rect width="1120" height="724" fill="#fcfcf8"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#16212b">Signal Pipeline Runtime Comparison</text>
  <text x="24" y="56" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4b5b67">250,000 samples, 16 passes, Apple M4, cross-language public slice with RR O2 cold/warm rows</text>
  <line x1="320" y1="86" x2="320" y2="664" stroke="#9aa8b2" stroke-width="1"/>
  <line x1="320" y1="664" x2="900" y2="664" stroke="#9aa8b2" stroke-width="1"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5d6b75">
    <text x="320" y="682" text-anchor="middle">0</text>
    <text x="436" y="682" text-anchor="middle">502</text>
    <text x="552" y="682" text-anchor="middle">1005</text>
    <text x="668" y="682" text-anchor="middle">1507</text>
    <text x="784" y="682" text-anchor="middle">2010</text>
    <text x="900" y="682" text-anchor="middle">2512</text>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16212b">
    <text x="24" y="104">Direct base R (scalar)</text>
    <text x="24" y="172">Direct base R (vectorized)</text>
    <text x="24" y="240">
      <tspan x="24" dy="0">Direct base R (vectorized, warm</tspan>
      <tspan x="24" dy="16">avg x10)</tspan>
    </text>
    <text x="24" y="308">RR O2 on GNU R</text>
    <text x="24" y="376">RR O2 on GNU R (warm avg x10)</text>
    <text x="24" y="444">C O3 native</text>
    <text x="24" y="512">NumPy</text>
    <text x="24" y="580">Julia</text>
  </g>
  <rect x="320" y="94" width="580.0" height="28" fill="#2a9d8f" rx="4"/>
  <text x="1102.0" y="113" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">2511.9 ms ± 79.5</text>
  <rect x="320" y="162" width="96.2" height="28" fill="#e76f51" rx="4"/>
  <text x="1102.0" y="181" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">416.8 ms ± 33.9</text>
  <rect x="320" y="230" width="54.9" height="28" fill="#264653" rx="4"/>
  <text x="1102.0" y="249" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">237.8 ms ± 4.4</text>
  <rect x="320" y="298" width="88.3" height="28" fill="#6d597a" rx="4"/>
  <text x="1102.0" y="317" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">382.4 ms ± 3.8</text>
  <rect x="320" y="366" width="58.2" height="28" fill="#457b9d" rx="4"/>
  <text x="1102.0" y="385" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">252.2 ms ± 13.8</text>
  <rect x="320" y="434" width="6.4" height="28" fill="#2a9d8f" rx="4"/>
  <text x="1102.0" y="453" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">27.9 ms ± 7.0</text>
  <rect x="320" y="502" width="43.5" height="28" fill="#e76f51" rx="4"/>
  <text x="1102.0" y="521" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">188.3 ms ± 18.2</text>
  <rect x="320" y="570" width="156.7" height="28" fill="#264653" rx="4"/>
  <text x="1102.0" y="589" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">678.7 ms ± 299.3</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4b5b67">
    <text x="24" y="702">Source data: signal-pipeline-runtime-2026-04-05.csv</text>
  </g>
</svg>
