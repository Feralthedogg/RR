<svg xmlns="http://www.w3.org/2000/svg" width="920" height="644" viewBox="0 0 920 644" role="img" aria-labelledby="title desc">
  <title id="title">Signal Pipeline Runtime Comparison</title>
  <desc id="desc">Mean wall-clock runtime in milliseconds for a cross-language signal preprocessing pipeline benchmark.</desc>
  <rect width="920" height="644" fill="#fcfcf8"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#16212b">Signal Pipeline Runtime Comparison</text>
  <text x="24" y="56" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4b5b67">250,000 samples, 16 passes, Apple M4, single-threaded, 5 timed runs, mean wall-clock ms</text>
  <line x1="320" y1="86" x2="320" y2="584" stroke="#9aa8b2" stroke-width="1"/>
  <line x1="320" y1="584" x2="850" y2="584" stroke="#9aa8b2" stroke-width="1"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5d6b75">
    <text x="320" y="602" text-anchor="middle">0</text>
    <text x="426" y="602" text-anchor="middle">213</text>
    <text x="532" y="602" text-anchor="middle">426</text>
    <text x="638" y="602" text-anchor="middle">639</text>
    <text x="744" y="602" text-anchor="middle">852</text>
    <text x="850" y="602" text-anchor="middle">1065</text>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16212b">
    <text x="24" y="106">Direct base R (scalar)</text>
    <text x="24" y="164">Direct base R (vectorized)</text>
    <text x="24" y="222">RR O2 on GNU R</text>
    <text x="24" y="280">C O3 native</text>
    <text x="24" y="338">NumPy</text>
    <text x="24" y="396">Julia</text>
    <text x="24" y="454">Direct base R (vectorized) on Renjin</text>
    <text x="24" y="512">RR O2 on Renjin</text>
  </g>
  <rect x="320" y="86" width="530.0" height="28" fill="#2a9d8f" rx="4"/>
  <text x="860.0" y="105" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">1065.1 ms ± 11.0</text>
  <rect x="320" y="144" width="88.0" height="28" fill="#e76f51" rx="4"/>
  <text x="418.0" y="163" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">176.9 ms ± 2.2</text>
  <rect x="320" y="202" width="94.5" height="28" fill="#264653" rx="4"/>
  <text x="424.5" y="221" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">189.9 ms ± 2.9</text>
  <rect x="320" y="260" width="5.0" height="28" fill="#6d597a" rx="4"/>
  <text x="335.0" y="279" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">10.0 ms ± 0.2</text>
  <rect x="320" y="318" width="38.5" height="28" fill="#457b9d" rx="4"/>
  <text x="368.5" y="337" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">77.4 ms ± 1.0</text>
  <rect x="320" y="376" width="130.4" height="28" fill="#2a9d8f" rx="4"/>
  <text x="460.4" y="395" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">262.0 ms ± 41.7</text>
  <rect x="320" y="434" width="451.4" height="28" fill="#e76f51" rx="4"/>
  <text x="781.4" y="453" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">907.2 ms ± 12.7</text>
  <rect x="320" y="492" width="488.0" height="28" fill="#264653" rx="4"/>
  <text x="818.0" y="511" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">980.6 ms ± 5.9</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4b5b67">
    <text x="24" y="622">Source data: signal_pipeline_bench.csv</text>
  </g>
</svg>
