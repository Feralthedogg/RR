<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1132" viewBox="0 0 1120 1132" role="img" aria-labelledby="title desc">
  <title id="title">Signal Pipeline Runtime Comparison</title>
  <desc id="desc">Mean wall-clock runtime in milliseconds for a cross-language signal preprocessing pipeline benchmark.</desc>
  <rect width="1120" height="1132" fill="#fcfcf8"/>
  <text x="24" y="34" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#16212b">Signal Pipeline Runtime Comparison</text>
  <text x="24" y="56" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#4b5b67">250,000 samples, 16 passes, Apple M4, 5 timed runs; non-parallel rows single-threaded, RR parallel-R row uses 4 workers, RR OpenMP row uses 4 threads</text>
  <line x1="320" y1="86" x2="320" y2="1072" stroke="#9aa8b2" stroke-width="1"/>
  <line x1="320" y1="1072" x2="900" y2="1072" stroke="#9aa8b2" stroke-width="1"/>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5d6b75">
    <text x="320" y="1090" text-anchor="middle">0</text>
    <text x="436" y="1090" text-anchor="middle">407</text>
    <text x="552" y="1090" text-anchor="middle">813</text>
    <text x="668" y="1090" text-anchor="middle">1220</text>
    <text x="784" y="1090" text-anchor="middle">1626</text>
    <text x="900" y="1090" text-anchor="middle">2033</text>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#16212b">
    <text x="24" y="104">Direct base R (scalar)</text>
    <text x="24" y="172">Direct base R (vectorized)</text>
    <text x="24" y="240">
      <tspan x="24" dy="0">Direct base R (vectorized, warm</tspan>
      <tspan x="24" dy="16">avg x10)</tspan>
    </text>
    <text x="24" y="308">RR O2 on GNU R</text>
    <text x="24" y="376">RR O2 on GNU R (warm avg x10)</text>
    <text x="24" y="444">RR O2 native on GNU R</text>
    <text x="24" y="512">
      <tspan x="24" dy="0">RR O2 native on GNU R (warm avg</tspan>
      <tspan x="24" dy="16">x10)</tspan>
    </text>
    <text x="24" y="580">
      <tspan x="24" dy="0">RR O2 parallel R (4 workers) on</tspan>
      <tspan x="24" dy="16">GNU R</tspan>
    </text>
    <text x="24" y="648">
      <tspan x="24" dy="0">RR O2 parallel R (4 workers) on</tspan>
      <tspan x="24" dy="16">GNU R (warm avg x10)</tspan>
    </text>
    <text x="24" y="716">
      <tspan x="24" dy="0">RR O2 native + OpenMP (4 threads)</tspan>
      <tspan x="24" dy="16">on GNU R</tspan>
    </text>
    <text x="24" y="784">
      <tspan x="24" dy="0">RR O2 native + OpenMP (4 threads)</tspan>
      <tspan x="24" dy="16">on GNU R (warm avg x10)</tspan>
    </text>
    <text x="24" y="852">C O3 native</text>
    <text x="24" y="920">NumPy</text>
    <text x="24" y="988">Julia</text>
  </g>
  <rect x="320" y="94" width="580.0" height="28" fill="#2a9d8f" rx="4"/>
  <text x="1102.0" y="113" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">2033.1 ms ± 26.1</text>
  <rect x="320" y="162" width="93.4" height="28" fill="#e76f51" rx="4"/>
  <text x="1102.0" y="181" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">327.4 ms ± 16.9</text>
  <rect x="320" y="230" width="52.6" height="28" fill="#264653" rx="4"/>
  <text x="1102.0" y="249" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">184.5 ms ± 3.6</text>
  <rect x="320" y="298" width="88.4" height="28" fill="#6d597a" rx="4"/>
  <text x="1102.0" y="317" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">309.9 ms ± 7.9</text>
  <rect x="320" y="366" width="55.9" height="28" fill="#457b9d" rx="4"/>
  <text x="1102.0" y="385" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">196.0 ms ± 1.3</text>
  <rect x="320" y="434" width="147.5" height="28" fill="#2a9d8f" rx="4"/>
  <text x="1102.0" y="453" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">517.2 ms ± 162.5</text>
  <rect x="320" y="502" width="63.0" height="28" fill="#e76f51" rx="4"/>
  <text x="1102.0" y="521" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">220.7 ms ± 17.7</text>
  <rect x="320" y="570" width="442.4" height="28" fill="#264653" rx="4"/>
  <text x="1102.0" y="589" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">1550.7 ms ± 39.1</text>
  <rect x="320" y="638" width="414.0" height="28" fill="#6d597a" rx="4"/>
  <text x="1102.0" y="657" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">1451.2 ms ± 21.3</text>
  <rect x="320" y="706" width="153.1" height="28" fill="#457b9d" rx="4"/>
  <text x="1102.0" y="725" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">536.6 ms ± 178.8</text>
  <rect x="320" y="774" width="64.1" height="28" fill="#2a9d8f" rx="4"/>
  <text x="1102.0" y="793" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">224.8 ms ± 19.0</text>
  <rect x="320" y="842" width="5.3" height="28" fill="#e76f51" rx="4"/>
  <text x="1102.0" y="861" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">18.5 ms ± 2.2</text>
  <rect x="320" y="910" width="46.5" height="28" fill="#264653" rx="4"/>
  <text x="1102.0" y="929" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">162.9 ms ± 10.6</text>
  <rect x="320" y="978" width="127.9" height="28" fill="#6d597a" rx="4"/>
  <text x="1102.0" y="997" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#16212b">448.4 ms ± 6.7</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4b5b67">
    <text x="24" y="1110">Source data: signal_pipeline_bench.csv</text>
  </g>
</svg>
