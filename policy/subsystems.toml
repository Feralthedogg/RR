[meta]
default_owner = "@Feralthedogg"
allowed_commit_prefixes = [
  "treewide",
  "docs",
  "ci",
  "tests",
  "tools",
  "build",
]
required_pr_sections = [
  "## Why",
  "## Risk",
  "## Test Plan",
  "## Performance Impact",
  "## Subsystems",
]
ignored_paths = [
  "docs/assets/",
  "tests/golden/Build/",
  "Rplots.pdf",
  "stats4_profile_plot.pdf",
  "stats_misc_qqnorm.png",
  "stats_signal_spec_plot.png",
  "stats_stepfun_plot.png",
  "native/rr_native.o",
]
required_commit_trailers = [
  "Subsystem",
  "Tested-by",
  "Risk",
]
perf_commit_trailers = [
  "Perf-impact",
]
dependency_commit_trailers = [
  "Dependency-impact",
]
exception_commit_trailers = [
  "Exceptions",
]
required_review_states = [
  "APPROVED",
]
min_owner_approvals = "1"
max_buildability_commits = "6"
build_command = "cargo check -q"
perf_sensitive_prefixes = [
  "src/compiler/",
  "src/hir/",
  "src/mir/",
  "src/codegen/",
  "src/runtime/",
  "tests/perf_regression_gate.rs",
  "scripts/perf_gate.sh",
]
dependency_files = [
  "Cargo.toml",
  "Cargo.lock",
]
exception_sensitive_prefixes = [
  "CONTRIBUTING.md",
  "policy/",
  "scripts/contributing_audit.pl",
  "scripts/check_pr_evidence.py",
]
triage_critical_subsystems = [
  "incremental",
  "codegen",
  "runtime",
  "parallel-native",
]
required_ci_checks_file = "policy/required_ci_checks.txt"
perf_delta_threshold_file = "policy/perf_delta_thresholds.txt"

[[subsystems]]
name = "tooling"
owners = [
  "@Feralthedogg",
]
paths = [
  ".gitignore",
  "Cargo.lock",
  "Cargo.toml",
  "README.md",
  "dist-workspace.toml",
  "CONTRIBUTING.md",
  ".github/",
  "src/main",
  "docs/README.md",
  "docs/cli.md",
  "docs/compiler/",
  "fuzz/",
  "policy/",
  "scripts/",
  "scripts/contributing_audit.pl",
  "scripts/contributing_audit.sh",
  "scripts/ci_contributing_audit.sh",
  "scripts/ci_contributing_semantic_audit.sh",
  "scripts/check_commit_series.pl",
  "scripts/check_required_ci_jobs.pl",
  "scripts/check_subsystem_reviews.pl",
  "scripts/build_failure_bundle.pl",
  "scripts/perf_governance.pl",
  "scripts/perf_delta_gate.pl",
  "scripts/compare_perf_reports.pl",
  "scripts/render_contributing_docs.py",
  "scripts/check_pr_evidence.py",
  "scripts/lib/test_manifests.sh",
  "tests/process_gate_smoke.rs",
  "tests/compiler_hardcode_guard.rs",
  "scripts/verify_cleanroom.sh",
  "tests/contributing_audit_smoke.rs",
  "policy/required_ci_checks.txt",
  "policy/perf_delta_thresholds.txt",
]
checks = [
  "docs_generated",
  "ci_contract",
  "process_smoke",
  "tier0",
]

[[subsystems]]
name = "frontend"
owners = [
  "@Feralthedogg",
  "@levish0",
]
paths = [
  "src/hir/",
  "src/typeck/",
  "tests/syntax_errors.rs",
  "tests/parse_multi_errors.rs",
  "tests/statement_boundaries.rs",
]
checks = [
  "tier0",
  "semantic_audit",
]

[[subsystems]]
name = "incremental"
owners = [
  "@Feralthedogg",
]
paths = [
  "src/compiler/incremental.rs",
  "src/main_compile.rs",
  "tests/incremental_",
  "tests/cache_equivalence_matrix.rs",
  "tests/cli_incremental_default.rs",
]
checks = [
  "cache_matrix",
  "semantic_audit",
]

[[subsystems]]
name = "optimizer"
owners = [
  "@Feralthedogg",
  "@levish0",
]
paths = [
  "src/mir/analyze/",
  "src/mir/flow.rs",
  "src/mir/opt/",
  "src/mir/semantics.rs",
  "src/mir/semantics/",
  "src/mir/verify.rs",
  "src/compiler/pipeline/phases/tachyon_runtime.rs",
  "src/compiler/peephole/",
  "tests/cases/optimizer/",
  "tests/sccp_overflow_regression.rs",
  "tests/opt_level_equivalence.rs",
  "tests/numeric_property_differential.rs",
  "tests/vectorization_extended.rs",
]
checks = [
  "optimizer_matrix",
  "optimizer_legality",
  "perf_governance",
  "semantic_audit",
]

[[subsystems]]
name = "runtime"
owners = [
  "@Feralthedogg",
]
paths = [
  "src/runtime/",
  "tests/runtime_",
  "tests/hermetic_determinism.rs",
]
checks = [
  "runtime_matrix",
  "semantic_audit",
]

[[subsystems]]
name = "parallel-native"
owners = [
  "@Feralthedogg",
  "@levish0",
]
paths = [
  "src/compiler/scheduler.rs",
  "src/mir/opt/poly/",
  "tests/compile_mode_stability_matrix.rs",
  "tests/compiler_parallel_",
  "tests/fallback_correctness_matrix.rs",
  "tests/parallel_optional_fallback_semantics.rs",
  "tests/native_optional_fallback.rs",
  "tests/poly_vopt_fallback.rs",
]
checks = [
  "parallel_matrix",
  "semantic_audit",
]

[[subsystems]]
name = "codegen"
owners = [
  "@Feralthedogg",
  "@levish0",
]
paths = [
  "src/codegen/",
  "src/compiler/pipeline/phases/source_emit.rs",
  "src/compiler/pipeline/late_raw_rewrites",
  "src/compiler/pipeline/raw_rewrites.rs",
  "src/compiler/pipeline.rs",
  "example/benchmarks/",
  "tests/benchmark_examples_smoke.rs",
  "tests/codegen_binding_regression.rs",
  "tests/common/",
  "tests/commercial_determinism.rs",
  "tests/compiler_parallel_equivalence.rs",
  "tests/compile_mode_perf_matrix.rs",
  "tests/example_perf_smoke.rs",
  "tests/tesseract_runtime_smoke.rs",
]
checks = [
  "determinism_matrix",
  "perf_governance",
  "semantic_audit",
]

[[subsystems]]
name = "packages"
owners = [
  "@Feralthedogg",
]
paths = [
  "src/pkg/",
  "tests/base_",
  "tests/compiler_direct_interop.rs",
  "tests/datasets_direct_types.rs",
  "tests/methods_direct_interop.rs",
]
checks = [
  "tier1",
]
