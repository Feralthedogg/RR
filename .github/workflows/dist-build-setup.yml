- name: Install Rust toolchain (Linux/macOS)
  if: runner.os != 'Windows'
  uses: dtolnay/rust-toolchain@stable

- name: Install Rust toolchain (Windows GNU)
  if: runner.os == 'Windows'
  uses: dtolnay/rust-toolchain@stable
  with:
    targets: x86_64-pc-windows-gnu

- name: Install static ISL dependencies (Linux)
  if: runner.os == 'Linux'
  shell: bash
  run: |
    sudo apt-get update
    sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev
    isl_dir="$(dpkg -L libisl-dev | grep '/libisl.a$' | head -n1 | xargs dirname)"
    gmp_dir="$(dpkg -L libgmp-dev | grep '/libgmp.a$' | head -n1 | xargs dirname)"
    test -n "$isl_dir" && test -f "$isl_dir/libisl.a"
    test -n "$gmp_dir" && test -f "$gmp_dir/libgmp.a"
    echo "RR_ISL_LIB_DIR=$isl_dir" >> "$GITHUB_ENV"
    echo "RR_GMP_LIB_DIR=$gmp_dir" >> "$GITHUB_ENV"
    echo "RR_ISL_LINK=static" >> "$GITHUB_ENV"

- name: Install static ISL dependencies (macOS)
  if: runner.os == 'macOS'
  shell: bash
  run: |
    brew install isl gmp
    isl_dir="$(brew --prefix isl)/lib"
    gmp_dir="$(brew --prefix gmp)/lib"
    test -f "$isl_dir/libisl.a"
    test -f "$gmp_dir/libgmp.a"
    echo "RR_ISL_LIB_DIR=$isl_dir" >> "$GITHUB_ENV"
    echo "RR_GMP_LIB_DIR=$gmp_dir" >> "$GITHUB_ENV"
    echo "RR_ISL_LINK=static" >> "$GITHUB_ENV"

- name: Install static ISL dependencies (Windows)
  if: runner.os == 'Windows'
  uses: msys2/setup-msys2@v2
  with:
    msystem: MINGW64
    update: true
    install: >-
      mingw-w64-x86_64-binutils
      mingw-w64-x86_64-gcc
      mingw-w64-x86_64-gmp
      mingw-w64-x86_64-isl

- name: Configure static ISL paths (Windows)
  if: runner.os == 'Windows'
  shell: msys2 {0}
  run: |
    test -f "$MINGW_PREFIX/lib/libisl.a"
    test -f "$MINGW_PREFIX/lib/libgmp.a"
    echo "RR_ISL_LIB_DIR=$(cygpath -m "$MINGW_PREFIX/lib")" >> "$GITHUB_ENV"
    echo "RR_GMP_LIB_DIR=$(cygpath -m "$MINGW_PREFIX/lib")" >> "$GITHUB_ENV"
    echo "RR_ISL_LINK=static" >> "$GITHUB_ENV"
    echo "$(cygpath -m "$MINGW_PREFIX/bin")" >> "$GITHUB_PATH"
