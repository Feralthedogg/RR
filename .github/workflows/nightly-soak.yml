name: RR Nightly Soak

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

env:
  RR_ISL_LINK: static

jobs:
  signal-pipeline-benchmark-report:
    name: Signal Pipeline Benchmark Report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: false

      - name: Install R + Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core clang libisl-dev libgmp-dev

      - name: Generate Signal Pipeline Memory Report
        run: |
          python3 scripts/bench_signal_pipeline_memory.py \
            --warm-iters 3 \
            --out-dir .artifacts/nightly-soak/signal-pipeline-memory \
            --csv-out .artifacts/nightly-soak/signal-pipeline-memory/signal-pipeline-memory.csv \
            --svg-out .artifacts/nightly-soak/signal-pipeline-memory/signal-pipeline-memory.svg

      - name: Publish Signal Pipeline Memory Summary
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv
          from pathlib import Path

          path = Path(".artifacts/nightly-soak/signal-pipeline-memory/signal-pipeline-memory.csv")
          rows = list(csv.DictReader(path.open()))
          print("## Signal Pipeline Memory Report")
          print()
          print("| Case | Alloc MB | Alloc events | Warm iters |")
          print("| --- | ---: | ---: | ---: |")
          for row in rows:
              print(f"| {row['label']} | {row['alloc_mb']} | {row['alloc_events']} | {row['warm_iters']} |")
          PY

      - name: Upload Signal Pipeline Benchmark Report
        uses: actions/upload-artifact@v6
        with:
          name: nightly-signal-pipeline-benchmark-report
          path: .artifacts/nightly-soak/signal-pipeline-memory
          if-no-files-found: error

  recommended-package-coverage:
    name: Recommended Package Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: false

      - name: Install R + Recommended Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core r-recommended libisl-dev libgmp-dev

      - name: Build Recommended Package Coverage
        run: bash scripts/recommended_package_coverage.sh .artifacts/recommended-package-coverage

      - name: Publish Recommended Package Coverage
        run: cat .artifacts/recommended-package-coverage/recommended-package-coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Recommended Package Coverage
        uses: actions/upload-artifact@v6
        with:
          name: nightly-recommended-package-coverage
          path: .artifacts/recommended-package-coverage
          if-no-files-found: error

  differential-soak:
    name: Differential Soak
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RR_RANDOM_DIFFERENTIAL_COUNT: "72"
      RR_RANDOM_DIFFERENTIAL_SEED: "0xA11CE5EED55AA11C"
      RR_VERIFY_DUMP_DIR: ".artifacts/nightly-soak/verify-dumps"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: false

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core libisl-dev libgmp-dev

      - name: Prepare Artifact Directory
        run: mkdir -p .artifacts/nightly-soak .artifacts/nightly-soak/verify-dumps

      - name: Random Differential Soak
        run: |
          set -o pipefail
          cargo test -q --test random_differential -- --nocapture \
            | tee .artifacts/nightly-soak/random_differential.log

      - name: Pass Verify Examples
        run: |
          set -o pipefail
          RR_VERIFY_EACH_PASS=1 cargo test -q --test pass_verify_examples \
            | tee .artifacts/nightly-soak/pass_verify_examples.log

      - name: Triage Differential Failure Bundles
        if: always()
        run: scripts/triage_driver.sh triage differential

      - name: Publish Differential Triage Summary
        if: always()
        run: cat .artifacts/differential-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Triage Pass-Verify Failure Bundles
        if: always()
        run: scripts/triage_driver.sh triage pass-verify

      - name: Publish Pass-Verify Triage Summary
        if: always()
        run: cat .artifacts/pass-verify-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke Differential Regression Skeletons
        if: always()
        run: scripts/triage_driver.sh smoke differential .artifacts/differential-triage

      - name: Smoke Pass-Verify Regression Skeletons
        if: always()
        run: scripts/triage_driver.sh smoke pass-verify .artifacts/pass-verify-triage

      - name: Upload Differential Soak Logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-differential-soak
          path: .artifacts/nightly-soak
          if-no-files-found: error

      - name: Upload Differential Failure Bundles
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-differential-failures
          path: target/tests/random_differential_failures
          if-no-files-found: ignore

      - name: Upload Differential Triage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-differential-triage
          path: .artifacts/differential-triage
          if-no-files-found: error

      - name: Upload Pass-Verify Failure Bundles
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-pass-verify-failures
          path: target/tests/pass_verify_failures
          if-no-files-found: ignore

      - name: Upload Pass-Verify Triage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-pass-verify-triage
          path: .artifacts/pass-verify-triage
          if-no-files-found: error

  fuzz-soak:
    name: Fuzz Soak
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "none"
      RR_QUIET_LOG: "1"
      RR_VERIFY_DUMP_DIR: ".artifacts/nightly-soak/verify-dumps"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: rust-src, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: false

      - name: Install Fuzz Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld libisl-dev libgmp-dev
          cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Prepare Artifact Directory
        run: mkdir -p .artifacts/nightly-soak .artifacts/nightly-soak/verify-dumps

      - name: Pipeline Fuzz Soak
        run: |
          set -o pipefail
          cargo fuzz run pipeline fuzz/corpus/pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=300 -rss_limit_mb=2048 \
            | tee .artifacts/nightly-soak/pipeline_fuzz.log

      - name: Incremental Fuzz Soak
        run: |
          set -o pipefail
          cargo fuzz run incremental_compile fuzz/corpus/incremental_compile -- -dict=fuzz/dictionaries/rr.dict -max_total_time=300 -rss_limit_mb=2048 \
            | tee .artifacts/nightly-soak/incremental_fuzz.log

      - name: Generated Pipeline Fuzz Soak
        run: |
          set -o pipefail
          cargo fuzz run generated_pipeline fuzz/corpus/generated_pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=300 -rss_limit_mb=2048 \
            | tee .artifacts/nightly-soak/generated_pipeline_fuzz.log

      - name: Triage Fuzz Crash Artifacts
        if: always()
        run: scripts/triage_driver.sh triage fuzz

      - name: Publish Fuzz Triage Summary
        if: always()
        run: cat .artifacts/fuzz-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke Fuzz Regression Skeletons
        if: always()
        run: scripts/triage_driver.sh smoke fuzz .artifacts/fuzz-triage

      - name: Upload Fuzz Soak Logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-fuzz-soak-logs
          path: .artifacts/nightly-soak
          if-no-files-found: error

      - name: Upload Fuzz Crash Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-fuzz-crash-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore

      - name: Upload Fuzz Triage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-fuzz-triage
          path: .artifacts/fuzz-triage
          if-no-files-found: error

  verification-summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs:
      - recommended-package-coverage
      - differential-soak
      - fuzz-soak
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Artifact Directory
        run: mkdir -p .artifacts .artifacts/nightly-soak

      - name: Download Differential Triage
        uses: actions/download-artifact@v4
        with:
          name: nightly-differential-triage
          path: .artifacts/differential-triage
          if-no-files-found: warn

      - name: Download Pass-Verify Triage
        uses: actions/download-artifact@v4
        with:
          name: nightly-pass-verify-triage
          path: .artifacts/pass-verify-triage
          if-no-files-found: warn

      - name: Download Fuzz Triage
        uses: actions/download-artifact@v4
        with:
          name: nightly-fuzz-triage
          path: .artifacts/fuzz-triage
          if-no-files-found: warn

      - name: Download Recommended Package Coverage
        uses: actions/download-artifact@v4
        with:
          name: nightly-recommended-package-coverage
          path: .artifacts/recommended-package-coverage
          if-no-files-found: warn

      - name: Build Verification Summary
        run: bash scripts/verification_summary.sh .artifacts .artifacts/nightly-soak

      - name: Publish Verification Summary
        run: cat .artifacts/nightly-soak/verification-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Top Promotion Candidates
        run: cat .artifacts/nightly-soak/top-promotion-candidates.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Recommended Package Coverage
        run: |
          if [ -f .artifacts/recommended-package-coverage/recommended-package-coverage.md ]; then
            cat .artifacts/recommended-package-coverage/recommended-package-coverage.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Verification Summary
        uses: actions/upload-artifact@v6
        with:
          name: nightly-verification-summary
          path: |
            .artifacts/nightly-soak/verification-summary.*
            .artifacts/nightly-soak/top-promotion-candidates.*
            .artifacts/recommended-package-coverage/*
          if-no-files-found: error
