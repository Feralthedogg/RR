name: RR CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: rr-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  RR_ISL_LINK: static

jobs:
  tier0:
    name: Tier 0 / Fast Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Contributing Audit
        shell: bash
        run: bash scripts/ci_contributing_audit.sh

      - name: Tier 0 Fast Tests
        run: bash scripts/test_tier.sh tier0

  platform-build:
    name: Platform Build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary_path: target/release/RR
            artifact_dir: .artifacts/platform-build/linux-x64
          - os: windows-latest
            label: windows-x64
            binary_path: target/x86_64-pc-windows-gnu/release/RR.exe
            artifact_dir: .artifacts/platform-build/windows-x64
          - os: macos-latest
            label: macos-arm64
            binary_path: target/release/RR
            artifact_dir: .artifacts/platform-build/macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust (stable, Windows GNU target)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev
          isl_dir="$(dpkg -L libisl-dev | grep '/libisl.a$' | head -n1 | xargs dirname)"
          gmp_dir="$(dpkg -L libgmp-dev | grep '/libgmp.a$' | head -n1 | xargs dirname)"
          test -n "$isl_dir" && test -f "$isl_dir/libisl.a"
          test -n "$gmp_dir" && test -f "$gmp_dir/libgmp.a"
          echo "RR_ISL_LIB_DIR=$isl_dir" >> "$GITHUB_ENV"
          echo "RR_GMP_LIB_DIR=$gmp_dir" >> "$GITHUB_ENV"

      - name: Install Static ISL Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install isl gmp
          isl_dir="$(brew --prefix isl)/lib"
          gmp_dir="$(brew --prefix gmp)/lib"
          test -f "$isl_dir/libisl.a"
          test -f "$gmp_dir/libgmp.a"
          echo "RR_ISL_LIB_DIR=$isl_dir" >> "$GITHUB_ENV"
          echo "RR_GMP_LIB_DIR=$gmp_dir" >> "$GITHUB_ENV"

      - name: Install Static ISL Dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-isl

      - name: Configure Static ISL Paths (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          test -f "$MINGW_PREFIX/lib/libisl.a"
          test -f "$MINGW_PREFIX/lib/libgmp.a"
          echo "RR_ISL_LIB_DIR=$(cygpath -m "$MINGW_PREFIX/lib")" >> "$GITHUB_ENV"
          echo "RR_GMP_LIB_DIR=$(cygpath -m "$MINGW_PREFIX/lib")" >> "$GITHUB_ENV"

      - name: Build RR Release Binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: cargo build --locked --release --bin RR

      - name: Build RR Release Binary (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cargo_bin="$(cygpath -u "$CARGO_HOME")/bin/cargo.exe"
          "$cargo_bin" build --locked --release --bin RR --target x86_64-pc-windows-gnu

      - name: Smoke Version Output (Linux/macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.binary_path }} --version

      - name: Smoke Version Output (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ${{ matrix.binary_path }} --version

      - name: Verify No Dynamic ISL/GMP Dependency (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "${{ matrix.artifact_dir }}"
          ldd "${{ matrix.binary_path }}" | tee "${{ matrix.artifact_dir }}/dynamic-deps.txt"
          ! grep -Ei 'libisl|libgmp' "${{ matrix.artifact_dir }}/dynamic-deps.txt"

      - name: Verify No Dynamic ISL/GMP Dependency (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p "${{ matrix.artifact_dir }}"
          otool -L "${{ matrix.binary_path }}" | tee "${{ matrix.artifact_dir }}/dynamic-deps.txt"
          ! grep -Ei 'libisl|libgmp' "${{ matrix.artifact_dir }}/dynamic-deps.txt"

      - name: Verify No Dynamic ISL/GMP Dependency (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p "${{ matrix.artifact_dir }}"
          objdump -p "${{ matrix.binary_path }}" | tee "${{ matrix.artifact_dir }}/dynamic-deps.txt"
          ! grep -Ei 'DLL Name: .*isl|DLL Name: .*gmp' "${{ matrix.artifact_dir }}/dynamic-deps.txt"

      - name: Prepare Build Artifact
        run: |
          mkdir -p "${{ matrix.artifact_dir }}"
          cp "${{ matrix.binary_path }}" "${{ matrix.artifact_dir }}/"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rr-${{ matrix.label }}-static-isl
          path: ${{ matrix.artifact_dir }}
          if-no-files-found: error

  tier1:
    name: Tier 1 / Library Packages
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Tier 1 Library Package Suite
        run: bash scripts/test_tier.sh tier1

  optimizer-legality:
    name: Optimizer / Legality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - tier0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Optimizer Legality Suite
        run: bash scripts/optimizer_suite.sh legality

  optimizer-heavy:
    name: Optimizer / Heavy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - tier0
      - tier1
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Optimizer Heavy Suite
        run: bash scripts/optimizer_suite.sh heavy

  perf-gate:
    name: Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Perf Gate Suite
        run: bash scripts/perf_gate.sh

  tier2-main:
    name: Tier 2 / Heavy Runtime and Examples
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - tier0
      - tier1
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Tier 2 Main Suite
        run: bash scripts/test_tier.sh tier2-main

  tier2-differential:
    name: Tier 2 / Differential and Pass Verify (${{ matrix.slice_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
      - tier1
      - optimizer-legality
    strategy:
      fail-fast: false
      matrix:
        include:
          - slice_name: diff-a
            differential_count: "12"
            differential_seed: "0xA11CE5EED55AA11C"
          - slice_name: diff-b
            differential_count: "12"
            differential_seed: "0x5EED123456789ABC"
    env:
      RR_RANDOM_DIFFERENTIAL_COUNT: ${{ matrix.differential_count }}
      RR_RANDOM_DIFFERENTIAL_SEED: ${{ matrix.differential_seed }}
      RR_VERIFY_DUMP_DIR: .artifacts/ci/tier2-differential/${{ matrix.slice_name }}/verify-dumps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Static ISL Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libisl-dev libgmp-dev

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Prepare Artifact Directory
        run: mkdir -p .artifacts/ci/tier2-differential/${{ matrix.slice_name }} "$RR_VERIFY_DUMP_DIR"

      - name: Tier 2 Differential Suite
        id: differential_suite
        continue-on-error: true
        run: |
          set -o pipefail
          bash scripts/test_tier.sh tier2-differential \
            | tee .artifacts/ci/tier2-differential/${{ matrix.slice_name }}/tier2-differential.log

      - name: Triage Differential Failure Bundles
        if: always()
        run: scripts/triage_driver.sh triage differential

      - name: Publish Differential Triage Summary
        if: always()
        run: |
          if [ -f .artifacts/differential-triage/job-summary.md ]; then
            cat .artifacts/differential-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Triage Pass-Verify Failure Bundles
        if: always()
        run: scripts/triage_driver.sh triage pass-verify

      - name: Publish Pass-Verify Triage Summary
        if: always()
        run: |
          if [ -f .artifacts/pass-verify-triage/job-summary.md ]; then
            cat .artifacts/pass-verify-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Tier 2 Differential Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-tier2-differential-${{ matrix.slice_name }}-logs
          path: .artifacts/ci/tier2-differential/${{ matrix.slice_name }}
          if-no-files-found: error

      - name: Upload Differential Failure Bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-tier2-differential-${{ matrix.slice_name }}-failures
          path: target/tests/random_differential_failures
          if-no-files-found: ignore

      - name: Upload Differential Triage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-tier2-differential-${{ matrix.slice_name }}-triage
          path: .artifacts/differential-triage
          if-no-files-found: error

      - name: Upload Pass-Verify Failure Bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-pass-verify-${{ matrix.slice_name }}-failures
          path: target/tests/pass_verify_failures
          if-no-files-found: ignore

      - name: Upload Pass-Verify Triage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-pass-verify-${{ matrix.slice_name }}-triage
          path: .artifacts/pass-verify-triage
          if-no-files-found: error

      - name: Fail If Differential Suite Failed
        if: steps.differential_suite.outcome != 'success'
        run: exit 1

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "none"
      RUSTUP_TOOLCHAIN: nightly-2026-01-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: rust-src, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Fuzz Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld libisl-dev libgmp-dev
          cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Prepare Artifact Directory
        run: mkdir -p .artifacts/ci/fuzz-smoke

      - name: Fuzz Smoke Suite
        id: fuzz_smoke_suite
        continue-on-error: true
        run: |
          set -o pipefail
          bash scripts/fuzz_smoke.sh | tee .artifacts/ci/fuzz-smoke/fuzz-smoke.log

      - name: Triage Fuzz Crash Artifacts
        if: always()
        run: scripts/triage_driver.sh triage fuzz

      - name: Publish Fuzz Triage Summary
        if: always()
        run: |
          if [ -f .artifacts/fuzz-triage/job-summary.md ]; then
            cat .artifacts/fuzz-triage/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Fuzz Smoke Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-fuzz-smoke-logs
          path: .artifacts/ci/fuzz-smoke
          if-no-files-found: error

      - name: Upload Fuzz Crash Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-fuzz-smoke-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore

      - name: Upload Fuzz Triage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-fuzz-smoke-triage
          path: .artifacts/fuzz-triage
          if-no-files-found: error

      - name: Fail If Fuzz Smoke Suite Failed
        if: steps.fuzz_smoke_suite.outcome != 'success'
        run: exit 1
