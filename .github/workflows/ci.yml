name: RR CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tier0:
    name: Tier 0 / Fast Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Contributing Audit
        shell: bash
        run: bash scripts/ci_contributing_audit.sh

      - name: Tier 0 Fast Tests
        run: bash scripts/test_tier.sh tier0

  tier1:
    name: Tier 1 / Library Packages
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Tier 1 Library Package Suite
        run: bash scripts/test_tier.sh tier1

  optimizer-legality:
    name: Optimizer / Legality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - tier0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Optimizer Legality Suite
        run: bash scripts/optimizer_suite.sh legality

  optimizer-heavy:
    name: Optimizer / Heavy
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - tier0
      - tier1
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Optimizer Heavy Suite
        run: bash scripts/optimizer_suite.sh heavy

  perf-gate:
    name: Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Perf Gate Suite
        run: bash scripts/perf_gate.sh

  tier2-main:
    name: Tier 2 / Heavy Runtime and Examples
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - tier0
      - tier1
      - optimizer-legality
    env:
      RR_PERF_GATE_MS: "45000"
      RR_PERF_O2_O1_RATIO: "12"
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "6500"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Tier 2 Main Suite
        run: bash scripts/test_tier.sh tier2-main

  tier2-differential:
    name: Tier 2 / Differential and Pass Verify (${{ matrix.slice_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - tier0
      - tier1
      - optimizer-legality
    strategy:
      fail-fast: false
      matrix:
        include:
          - slice_name: diff-a
            differential_count: "12"
            differential_seed: "0xA11CE5EED55AA11C"
          - slice_name: diff-b
            differential_count: "12"
            differential_seed: "0x5EED123456789ABC"
    env:
      RR_RANDOM_DIFFERENTIAL_COUNT: ${{ matrix.differential_count }}
      RR_RANDOM_DIFFERENTIAL_SEED: ${{ matrix.differential_seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Tier 2 Differential Suite
        run: bash scripts/test_tier.sh tier2-differential

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "none"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: rust-src, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Fuzz Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld
          cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Parser Fuzz Smoke
        run: cargo fuzz run parser fuzz/corpus_smoke/parser -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Pipeline Fuzz Smoke
        run: cargo fuzz run pipeline fuzz/corpus_smoke/pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Type Solver Fuzz Smoke
        run: cargo fuzz run type_solver fuzz/corpus_smoke/type_solver -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Incremental Fuzz Smoke
        run: cargo fuzz run incremental_compile fuzz/corpus_smoke/incremental_compile -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Generated Pipeline Fuzz Smoke
        run: cargo fuzz run generated_pipeline fuzz/corpus_smoke/generated_pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048
