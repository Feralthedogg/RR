name: RR CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format
        run: cargo fmt --check

  test:
    name: Core Tests + Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RR_PERF_GATE_MS: "12000"
      RR_PERF_O2_O1_RATIO: "12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Run Core Tests
        run: >
          cargo test -q -- --skip simulation_examples_compile_across_opt_levels
          --skip simulation_examples_run_at_o2
          --skip simulation_reference_examples_match_between_o0_and_o2
          --skip benchmark_examples_compile_at_o2
          --skip benchmark_examples_run_at_o2
          --skip tesseract_compiles_across_opt_levels
          --skip tesseract_runs_at_o2

  examples:
    name: Example Smoke + Perf
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "5000"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "25000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Simulation Example Smoke
        run: cargo test -q --test example_simulations

      - name: Benchmark Example Smoke
        run: cargo test -q --test benchmark_examples_smoke

      - name: Tesseract Smoke
        run: cargo test -q --test tesseract_runtime_smoke

      - name: Example Perf Smoke
        run: cargo test -q --test example_perf_smoke -- --ignored --nocapture

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "none"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: rust-src, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Fuzz Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld
          cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Parser Fuzz Smoke
        run: cargo fuzz run parser fuzz/corpus/parser -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Pipeline Fuzz Smoke
        run: cargo fuzz run pipeline fuzz/corpus/pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Type Solver Fuzz Smoke
        run: cargo fuzz run type_solver fuzz/corpus/type_solver -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Incremental Fuzz Smoke
        run: cargo fuzz run incremental_compile fuzz/corpus/incremental_compile -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048
