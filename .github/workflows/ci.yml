name: RR CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Contributing Audit
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="$(
            python3 -c '
          import json
          import os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          base = ""
          if event_path:
              with open(event_path, "r", encoding="utf-8") as fh:
                  event = json.load(fh)
              if event_name == "pull_request":
                  base = event.get("pull_request", {}).get("base", {}).get("sha", "")
              elif event_name == "push":
                  base = event.get("before", "")
          if base and set(base) == {"0"}:
              base = ""
          print(base)
          '
          )"
          if [[ -n "$BASE_SHA" ]]; then
            bash scripts/contributing_audit.sh --scan-only --base "$BASE_SHA"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            bash scripts/contributing_audit.sh --scan-only --base "$(git rev-parse --verify HEAD^)"
          else
            HEAD_FILES="$(
              git diff-tree --root --no-commit-id --name-only -r HEAD --
              | awk '
                  /^src\// || /^tests\// || /^docs\// || /^scripts\// || /^CONTRIBUTING\.md$/ {
                    print
                  }
                '
              | sort -u
            )"
            if [[ -n "$HEAD_FILES" ]]; then
              AUDIT_FILES=()
              while IFS= read -r line; do
                AUDIT_FILES+=("$line")
              done <<<"$HEAD_FILES"
              bash scripts/contributing_audit.sh --scan-only --files "${AUDIT_FILES[@]}"
            else
              bash scripts/contributing_audit.sh --scan-only
            fi
          fi

  test:
    name: Core Tests + Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RR_PERF_GATE_MS: "12000"
      RR_PERF_O2_O1_RATIO: "12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Run Core Tests
        run: >
          cargo test -q -- --skip simulation_examples_compile_across_opt_levels
          --skip simulation_examples_run_at_o2
          --skip simulation_reference_examples_match_between_o0_and_o2
          --skip benchmark_examples_compile_at_o2
          --skip benchmark_examples_run_at_o2
          --skip tesseract_compiles_across_opt_levels
          --skip tesseract_runs_at_o2

  differential:
    name: Differential + Pass Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - differential_count: "12"
            differential_seed: "0xA11CE5EED55AA11C"
          - differential_count: "12"
            differential_seed: "0x5EED123456789ABC"
    env:
      RR_RANDOM_DIFFERENTIAL_COUNT: ${{ matrix.differential_count }}
      RR_RANDOM_DIFFERENTIAL_SEED: ${{ matrix.differential_seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Random Differential
        run: cargo test -q --test random_differential

      - name: Pass Verify Examples
        run: RR_VERIFY_EACH_PASS=1 cargo test -q --test pass_verify_examples

  examples:
    name: Example Smoke + Perf
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RR_EXAMPLE_PERF_TOTAL_COMPILE_O2_MS: "5000"
      RR_EXAMPLE_PERF_TOTAL_RUNTIME_O2_MS: "30000"
      RR_EXAMPLE_PERF_MAX_CASE_RUNTIME_O2_MS: "30000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Rscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base-core

      - name: Simulation Example Smoke
        run: cargo test -q --test example_simulations

      - name: Benchmark Example Smoke
        run: cargo test -q --test benchmark_examples_smoke

      - name: Tesseract Smoke
        run: cargo test -q --test tesseract_runtime_smoke

      - name: Example Perf Smoke
        run: cargo test -q --test example_perf_smoke -- --ignored --nocapture

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_STRIP: "none"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: rust-src, llvm-tools-preview

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Fuzz Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld
          cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Parser Fuzz Smoke
        run: cargo fuzz run parser fuzz/corpus/parser -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Pipeline Fuzz Smoke
        run: cargo fuzz run pipeline fuzz/corpus/pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Type Solver Fuzz Smoke
        run: cargo fuzz run type_solver fuzz/corpus/type_solver -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Incremental Fuzz Smoke
        run: cargo fuzz run incremental_compile fuzz/corpus/incremental_compile -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048

      - name: Generated Pipeline Fuzz Smoke
        run: cargo fuzz run generated_pipeline fuzz/corpus/generated_pipeline -- -dict=fuzz/dictionaries/rr.dict -max_total_time=20 -rss_limit_mb=2048
